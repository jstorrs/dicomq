# Local commit-time checks. One-time setup:  pre-commit install
# Run over everything on demand:             pre-commit run --all-files
#
# clang-format is pinned to the same version as CI and the developer's
# local install, so the three never disagree on layout. clang-tidy is NOT
# here (it needs build/compile_commands.json and is slow) -- CI runs it.
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-yaml
