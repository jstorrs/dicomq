name: Linux build

on:
  push:
  pull_request:
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab / gh

# Rapid pushes should not pile up slow DCMTK builds: cancel an in-progress
# run on the same ref when a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Why this job exists: the only other build/test job runs on macOS. The
# inotify-driven scan in src/send/main.cc is Linux-only (macOS falls back
# to periodic scanning), so without a Linux runner that path — and any
# other Linux-specific runtime behaviour — is never exercised in CI. This
# job builds and runs the full ctest suite (unit + network integration)
# on Ubuntu; loopback DICOM networking works on hosted runners, so the
# storescu/storescp legs run for real here.
#
# DCMTK split: the 3.7.0 floor CMakeLists enforces (the CVE-2025-14607
# fix) only matters for the libraries dicomq *links*, so we build just
# those from source. The test harness uses DCMTK's storescu/storescp/
# dcmdump/dump2dcm only as external peers, where the version is
# irrelevant, so those come from apt. The library build is cached and
# saved even when a later step fails, so it is paid once.

jobs:
  build:
    runs-on: ubuntu-latest
    # Safety net: a correctly scoped DCMTK build finishes in a few
    # minutes. If it ever balloons (e.g. module trimming stops working and
    # it builds everything again), fail fast instead of burning hours.
    timeout-minutes: 30

    # One source of truth for the DCMTK build inputs. The cache key below
    # folds in the version AND a hash of this workflow file, so editing the
    # module list (or the version) auto-invalidates a stale cached install
    # instead of silently serving libraries built from a different module set.
    env:
      DCMTK_VERSION: "3.7.0"
      DCMTK_MODULES: "ofstd;oflog;oficonv;dcmdata;dcmimgle;dcmimage;dcmjpeg;dcmjpls;dcmnet;dcmtls"

    steps:
      - uses: actions/checkout@v5

      # build deps for the DCMTK libraries + dcmtk (storescu/storescp/
      # dcmdump/dump2dcm) as test peers. zlib enables deflated transfer
      # syntax; OpenSSL is required by dcmtls.
      - name: Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make libssl-dev zlib1g-dev dcmtk

      - name: Restore cached DCMTK
        id: cache-dcmtk
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/dcmtk-install
          key: dcmtk-${{ env.DCMTK_VERSION }}-${{ hashFiles('.github/workflows/linux.yml') }}-${{ runner.os }}-${{ runner.arch }}

      # DCMTK_MODULES limits the build to the libraries dicomq links and
      # their dependencies. BUILD_APPS=OFF only skips the command-line
      # tools, NOT the library modules -- without this the build also
      # compiles dcmrt/dcmiod/dcmwlm/dcmqrdb/dcmsr/... (dcmrt alone is
      # hundreds of files), which is what was timing the job out. PNG/TIFF
      # are dcmimage export features dicomq does not use.
      - name: Build DCMTK ${{ env.DCMTK_VERSION }} libraries (cache miss only)
        if: steps.cache-dcmtk.outputs.cache-hit != 'true'
        run: |
          src="$RUNNER_TEMP/dcmtk-src"
          git clone --depth 1 --branch "DCMTK-$DCMTK_VERSION" \
            https://github.com/DCMTK/dcmtk.git "$src"
          cmake -S "$src" -B "$src/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_APPS=OFF \
            -DDCMTK_MODULES="$DCMTK_MODULES" \
            -DDCMTK_WITH_OPENSSL=ON \
            -DDCMTK_WITH_ZLIB=ON \
            -DDCMTK_WITH_PNG=OFF \
            -DDCMTK_WITH_TIFF=OFF \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/dcmtk-install"
          cmake --build "$src/build" --parallel
          cmake --install "$src/build"

      # Save even if a later step fails, so the one-time library build is
      # never repeated on a flaky test run. No-ops when the key already hit.
      - name: Save cached DCMTK
        if: always() && steps.cache-dcmtk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/dcmtk-install
          key: dcmtk-${{ env.DCMTK_VERSION }}-${{ hashFiles('.github/workflows/linux.yml') }}-${{ runner.os }}-${{ runner.arch }}

      - name: Configure
        run: cmake -B build -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/dcmtk-install"

      - name: Build
        run: cmake --build build --parallel

      # storescu/storescp/dcmdump/dump2dcm come from the apt dcmtk package
      # (already on PATH); the network legs run against them as peers.
      - name: Test
        run: ctest --test-dir build --output-on-failure
