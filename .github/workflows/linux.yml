name: Linux build

on:
  push:
  pull_request:
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab / gh

# Why this job exists: the only other build/test job runs on macOS. The
# inotify-driven scan in src/send/main.cc is Linux-only (macOS falls back
# to periodic scanning), so without a Linux runner that path — and any
# other Linux-specific runtime behaviour — is never exercised in CI. This
# job builds and runs the full ctest suite (unit + network integration)
# on Ubuntu; loopback DICOM networking works on hosted runners, so the
# storescu/storescp legs run for real here.
#
# DCMTK split: the 3.7.0 floor CMakeLists enforces (the CVE-2025-14607
# fix) only matters for the libraries dicomq *links*, so we build just
# those from source (BUILD_APPS=OFF — skipping DCMTK's ~100 command-line
# tools is the bulk of the build time). The test harness uses DCMTK's
# storescu/storescp/dcmdump/dump2dcm only as external peers, where the
# version is irrelevant, so those come from apt. The library build is
# cached and saved even when a later step fails, so it is paid once.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # build deps for the DCMTK libraries + dcmtk (storescu/storescp/
      # dcmdump/dump2dcm) as test peers. zlib enables deflated transfer
      # syntax; OpenSSL is required by dcmtls.
      - name: Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make libssl-dev zlib1g-dev dcmtk

      - name: Restore cached DCMTK
        id: cache-dcmtk
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/dcmtk-install
          key: dcmtk-libs-3.7.0-${{ runner.os }}-${{ runner.arch }}

      # Libraries only: BUILD_APPS=OFF drops the command-line tools (the
      # bulk of the build), PNG/TIFF are dcmimage export features dicomq
      # does not use.
      - name: Build DCMTK 3.7.0 libraries (cache miss only)
        if: steps.cache-dcmtk.outputs.cache-hit != 'true'
        env:
          DCMTK_VERSION: "3.7.0"
        run: |
          src="$RUNNER_TEMP/dcmtk-src"
          git clone --depth 1 --branch "DCMTK-$DCMTK_VERSION" \
            https://github.com/DCMTK/dcmtk.git "$src"
          cmake -S "$src" -B "$src/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_APPS=OFF \
            -DDCMTK_WITH_OPENSSL=ON \
            -DDCMTK_WITH_ZLIB=ON \
            -DDCMTK_WITH_PNG=OFF \
            -DDCMTK_WITH_TIFF=OFF \
            -DDCMTK_WITH_TANDEM=OFF \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/dcmtk-install"
          cmake --build "$src/build" --parallel
          cmake --install "$src/build"

      # Save even if a later step fails, so the one-time library build is
      # never repeated on a flaky test run. No-ops when the key already hit.
      - name: Save cached DCMTK
        if: always() && steps.cache-dcmtk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/dcmtk-install
          key: dcmtk-libs-3.7.0-${{ runner.os }}-${{ runner.arch }}

      - name: Configure
        run: cmake -B build -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/dcmtk-install"

      - name: Build
        run: cmake --build build --parallel

      # storescu/storescp/dcmdump/dump2dcm come from the apt dcmtk package
      # (already on PATH); the network legs run against them as peers.
      - name: Test
        run: ctest --test-dir build --output-on-failure
