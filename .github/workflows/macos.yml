name: macOS build

on:
  push:
  pull_request:
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab / gh

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (arm64) runner — native build + real test execution

    steps:
      - uses: actions/checkout@v5

      # llvm is pinned to major 21 to match the clang-format pin (21.1.8)
      # and the version the .clang-tidy baseline was tuned against. The
      # plain `llvm` formula floats to the newest major (now 22), which
      # both fails to locate the macOS SDK C++ headers under brew's
      # clang-tidy and auto-enables new bugprone-*/clang-analyzer-* checks
      # via the wildcards in .clang-tidy -- neither vetted here. Bump this
      # deliberately when adopting a new toolchain, not implicitly.
      - name: Install dependencies
        run: brew install cmake dcmtk dylibbundler llvm@21

      - name: Configure
        run: cmake -B build -DCMAKE_PREFIX_PATH="$(brew --prefix dcmtk)"

      # clang-tidy runs here because build/compile_commands.json (from
      # Configure) and a 3.7.0 DCMTK already exist on this runner. The
      # .clang-tidy config is advisory locally; CI enforces it with
      # --warnings-as-errors.
      - name: Lint (clang-tidy)
        run: |
          # brew --prefix resolves the formula even though it is keg-only
          # / unlinked, so the explicit path works without `brew link`.
          tidy="$(brew --prefix llvm@21)/bin/clang-tidy"
          "$tidy" --version
          # compile_commands.json comes from AppleClang, which finds the
          # macOS SDK (and its libc++ headers) implicitly. brew's clang-tidy
          # does not, so '<string>'/'<iostream>' etc. come up "file not
          # found" -- point it at the active SDK explicitly.
          sdk="$(xcrun --show-sdk-path)"
          "$tidy" -p build \
            --extra-arg=-isysroot --extra-arg="$sdk" \
            --warnings-as-errors='*' $(git ls-files 'src/*.cc')

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage binaries
        run: cmake --install build --prefix "$RUNNER_TEMP/dist"

      - name: Bundle dependent dylibs (self-contained, no Homebrew needed)
        run: |
          dist="$RUNNER_TEMP/dist"
          # Collect every dicomq-* program; share one libs/ dir, sibling to bin/.
          xs=()
          for b in "$dist"/bin/dicomq-*; do xs+=(-x "$b"); done
          # -b bundle non-system deps, -d dest, -p the path baked into headers.
          # @loader_path/../libs resolves from both bin/ (exec) and libs/ (lib).
          dylibbundler -od -b -cd -d "$dist/libs" -p '@loader_path/../libs/' "${xs[@]}"
          # Rewriting Mach-O headers voids signatures; arm64 refuses to load an
          # unsigned/broken binary, so re-sign ad-hoc. Libs first, then execs.
          codesign --force --sign - "$dist"/libs/*.dylib
          for b in "$dist"/bin/dicomq-*; do codesign --force --sign - "$b"; done

      - name: Verify the tree is Homebrew-free
        run: |
          dist="$RUNNER_TEMP/dist"
          bad=0
          for f in "$dist"/bin/dicomq-* "$dist"/libs/*.dylib; do
            if otool -L "$f" | grep -q /opt/homebrew; then
              echo "::error::leftover Homebrew dependency in $f"
              otool -L "$f" | grep /opt/homebrew
              bad=1
            fi
          done
          [ "$bad" -eq 0 ] && echo "OK: no /opt/homebrew references in bin/ or libs/"

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: dicomq-macos-arm64
          path: ${{ runner.temp }}/dist/
          if-no-files-found: error
