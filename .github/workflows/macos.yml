name: macOS build

on:
  push:
  pull_request:
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab / gh

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (arm64) runner — native build + real test execution

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install cmake dcmtk

      - name: Configure
        run: cmake -B build -DCMAKE_PREFIX_PATH="$(brew --prefix dcmtk)"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage binaries
        run: cmake --install build --prefix "$RUNNER_TEMP/dist"

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: dicomq-macos-arm64
          path: ${{ runner.temp }}/dist/
          if-no-files-found: error
